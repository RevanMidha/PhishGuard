services:
  mongo:
    build:
      context: ./mongo
      dockerfile: Dockerfile
    container_name: phishguard-mongo
    ports:
      - "27017:27017"
    networks:
      - phishguard-net
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: phishguard-backend
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env.example
    depends_on:
      - mongo
    networks:
      - phishguard-net
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: phishguard-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - phishguard-net
    restart: unless-stopped

  ml_engine:
    build:
      context: ./ml_engine
      dockerfile: Dockerfile
    container_name: phishguard-ml-engine
    ports:
      - "5001:5001"
    networks:
      - phishguard-net
    restart: unless-stopped

networks:
  phishguard-net:
    driver: bridge

volumes:
  mongo_data:
